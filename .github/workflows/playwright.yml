name: Playwright Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
    - name: Install dependencies
      run: npm ci
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
    - name: Prepare Clerk admin storage state
      if: ${{ secrets.E2E_ADMIN_STORAGE_STATE != '' }}
      shell: bash
      run: |
        mkdir -p playwright/.auth
        printf '%s' "$E2E_ADMIN_STORAGE_STATE_SECRET" > /tmp/admin-storage-state.secret
        if base64 --decode /tmp/admin-storage-state.secret > playwright/.auth/admin.json 2>/dev/null && grep -q '"cookies"' playwright/.auth/admin.json; then
          echo "Decoded base64 admin storage state."
        else
          cp /tmp/admin-storage-state.secret playwright/.auth/admin.json
          echo "Wrote raw JSON admin storage state."
        fi
      env:
        E2E_ADMIN_STORAGE_STATE_SECRET: ${{ secrets.E2E_ADMIN_STORAGE_STATE }}
    - name: Run Playwright tests
      run: npm run test:e2e
      env:
        E2E_BASE_URL: ${{ secrets.E2E_BASE_URL }}
        E2E_ADMIN_STORAGE_STATE: playwright/.auth/admin.json
        E2E_STRIPE_FULL_FLOW: ${{ secrets.E2E_STRIPE_FULL_FLOW }}
    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30
